<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c0c14">
<title>Point Cloud — Mobile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; }
  body {
    background: #0c0c14; color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  canvas { display: block; touch-action: none; }

  /* ── Top bar ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 8px) 12px 8px;
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(to bottom, rgba(12,12,20,0.85), rgba(12,12,20,0));
    pointer-events: none; z-index: 10;
  }
  #topbar > * { pointer-events: auto; }
  #model-select {
    flex: 1; min-width: 0;
    background: rgba(20,20,32,0.85); color: #eee;
    border: 1px solid #2a2a3a; border-radius: 8px;
    padding: 10px 12px; font-size: 14px;
    appearance: none; -webkit-appearance: none;
    backdrop-filter: blur(8px);
  }

  /* segmented collection picker */
  #coll-tabs {
    display: flex; flex-shrink: 0;
    background: rgba(20,20,32,0.85); border: 1px solid #2a2a3a;
    border-radius: 8px; overflow: hidden; backdrop-filter: blur(8px);
  }
  #coll-tabs button {
    background: transparent; border: 0; color: #99a;
    padding: 10px 10px; font-size: 12px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
  }
  #coll-tabs button + button { border-left: 1px solid #2a2a3a; }
  #coll-tabs button.active { background: rgba(70,120,170,0.85); color: #fff; }
  #coll-tabs button:active { background: rgba(40,55,80,0.92); }
  .icon-btn {
    width: 42px; height: 42px; flex-shrink: 0;
    background: rgba(20,20,32,0.85); border: 1px solid #2a2a3a;
    border-radius: 8px; color: #cde; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(8px);
  }
  .icon-btn:active { background: rgba(40,55,80,0.9); }

  /* ── Status / hint ── */
  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 15px; color: #aab; padding: 14px 18px;
    background: rgba(20,20,32,0.85); border-radius: 10px;
    backdrop-filter: blur(8px); z-index: 8;
  }
  #status.hidden { display: none; }
  #mode-pill {
    position: fixed; left: 50%; transform: translateX(-50%);
    top: calc(env(safe-area-inset-top) + 64px);
    padding: 6px 12px; font-size: 12px; font-weight: 600;
    background: rgba(70,120,170,0.85); color: #fff;
    border-radius: 14px; backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 0.25s; z-index: 9; pointer-events: none;
    letter-spacing: 0.03em;
  }
  #mode-pill.show { opacity: 1; }

  /* ── Bottom controls ── */
  #bottom {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 10px 12px calc(env(safe-area-inset-bottom) + 12px);
    background: linear-gradient(to top, rgba(12,12,20,0.92), rgba(12,12,20,0));
    z-index: 10;
  }
  #btn-row { display: flex; gap: 8px; justify-content: center; }
  .ctl-btn {
    flex: 1; max-width: 130px;
    padding: 12px 8px; font-size: 13px; font-weight: 600;
    background: rgba(20,20,32,0.88); color: #cde;
    border: 1px solid #2a2a3a; border-radius: 10px;
    cursor: pointer; backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .ctl-btn:active { background: rgba(40,55,80,0.92); }
  .ctl-btn.active {
    background: rgba(70,120,170,0.85); border-color: #5a8ec0; color: #fff;
  }
  .ctl-btn .ico { font-size: 16px; }

  /* ── Sheet ── */
  #sheet-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 20; backdrop-filter: blur(2px);
  }
  #sheet-bg.open { opacity: 1; pointer-events: auto; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #14141e; color: #eee;
    border-top-left-radius: 16px; border-top-right-radius: 16px;
    padding: 8px 16px calc(env(safe-area-inset-bottom) + 18px);
    transform: translateY(100%); transition: transform 0.25s ease;
    z-index: 21; border-top: 1px solid #2a2a3a;
    max-height: 85vh; overflow-y: auto;
  }
  #sheet.open { transform: translateY(0); }
  #sheet-handle {
    width: 40px; height: 4px; background: #444; border-radius: 2px;
    margin: 8px auto 14px;
  }
  #sheet h3 {
    font-size: 11px; color: #8af; letter-spacing: 0.08em; text-transform: uppercase;
    margin: 14px 0 8px;
  }
  #sheet h3:first-of-type { margin-top: 0; }
  .sheet-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .sheet-row label {
    display: flex; justify-content: space-between; font-size: 13px; color: #aab;
  }
  .sheet-row label span { color: #fff; font-variant-numeric: tabular-nums; }
  .sheet-row input[type=range] { width: 100%; height: 32px; accent-color: #58a; }
  .sheet-row select {
    width: 100%; background: #1a1a2a; color: #eee;
    border: 1px solid #333; border-radius: 8px;
    padding: 10px 12px; font-size: 14px; appearance: none; -webkit-appearance: none;
  }
  .link-btn {
    display: block; text-align: center;
    padding: 12px; margin-top: 10px;
    background: #1b2e48; color: #7ab;
    border: 1px solid #385878; border-radius: 8px;
    text-decoration: none; font-size: 14px; font-weight: 600;
  }
</style>
</head>
<body>

<div id="status">Loading…</div>
<div id="mode-pill">Orbit Mode</div>

<div id="topbar">
  <div id="coll-tabs">
    <button data-coll="examples" class="active">Examples</button>
    <button data-coll="apex">Apex</button>
  </div>
  <select id="model-select"><option value="">Scanning…</option></select>
  <div id="settings-btn" class="icon-btn">⚙</div>
</div>

<div id="bottom">
  <div id="btn-row">
    <button id="lock-btn" class="ctl-btn"><span class="ico">🔒</span><span id="lock-label">Rotate Model</span></button>
    <button id="reset-btn" class="ctl-btn"><span class="ico">⟲</span><span>Reset</span></button>
    <button id="axes-btn" class="ctl-btn"><span class="ico">📐</span><span>Axes</span></button>
  </div>
</div>

<div id="sheet-bg"></div>
<div id="sheet">
  <div id="sheet-handle"></div>

  <h3>Display</h3>
  <div class="sheet-row">
    <label>Point Size <span id="sz-val">3</span></label>
    <input type="range" id="sz" min="0.1" max="20" step="0.1" value="3">
  </div>

  <h3>Share</h3>
  <a id="copy-link-btn" class="link-btn" href="#">⎘ Copy shareable link</a>
  <a href="/upload" class="link-btn">Upload &amp; Generate ↗</a>
  <a href="/" class="link-btn">Desktop Viewer ↗</a>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const $ = id => document.getElementById(id);
const status   = $('status');
const select   = $('model-select');
const collTabs = $('coll-tabs');
const modePill = $('mode-pill');
const D2R = Math.PI / 180;

let currentCollection = 'examples';
function setCollection(name) {
  currentCollection = name;
  collTabs.querySelectorAll('button').forEach(b =>
    b.classList.toggle('active', b.dataset.coll === name));
}

// ── Renderer / scene / camera ─────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0c14);
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.001, 2000);
camera.position.set(0, 0, 3);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.rotateSpeed = 0.7;
controls.zoomSpeed = 1.0;
controls.panSpeed = 0.8;
controls.minDistance = 0.001;
controls.maxDistance = 2000;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
controls.target.set(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Material + helpers ────────────────────────────────────────────────────────
function makeCircleTex() {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d');
  ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  return new THREE.CanvasTexture(c);
}
const material = new THREE.PointsMaterial({
  vertexColors: true, sizeAttenuation: true, size: 0.03,
  map: makeCircleTex(), alphaTest: 0.5, transparent: true,
});
let cloud = null;
let sceneSize = 1;
let szBase = 1;  // material.size = szBase * (slider/3)

const gridHelper = new THREE.GridHelper(2, 20, 0x4a6a8a, 0x2a3a4a);
gridHelper.material.transparent = true; gridHelper.material.opacity = 0.55;
const axesHelper = new THREE.AxesHelper(1);
gridHelper.visible = false;
axesHelper.visible = false;
scene.add(gridHelper);
scene.add(axesHelper);

function scaleHelpers(s) {
  gridHelper.scale.setScalar(s * 0.6);
  axesHelper.scale.setScalar(s * 0.3);
}

function applyPointSize() {
  const v = parseFloat($('sz').value);
  $('sz-val').textContent = v.toFixed(1);
  material.size = szBase * (v / 3);
}

// ── State ─────────────────────────────────────────────────────────────────────
let lockMode = false;
let axesOn   = false;
const drag = { active: false, lastX: 0, lastY: 0, pointers: new Map() };

// ── Streaming PLY loader (adapted from examples/viewer.html) ──────────────────
let loadAc = null;

async function streamPly(source) {
  if (loadAc) loadAc.abort();
  loadAc = new AbortController();
  const myAc = loadAc;

  const TYPE_SIZE = {
    float:4, float32:4, double:8, float64:8,
    uchar:1, uint8:1, char:1, int8:1,
    short:2, ushort:2, int16:2, uint16:2,
    int:4, uint:4, int32:4, uint32:4
  };
  function typeRead(view, type, offset, le) {
    switch (type) {
      case 'float': case 'float32': return view.getFloat32(offset, le);
      case 'double': case 'float64': return view.getFloat64(offset, le);
      case 'uchar': case 'uint8': return view.getUint8(offset);
      case 'char':  case 'int8':  return view.getInt8(offset);
      case 'short': case 'int16': return view.getInt16(offset, le);
      case 'ushort': case 'uint16': return view.getUint16(offset, le);
      case 'int':   case 'int32': return view.getInt32(offset, le);
      case 'uint':  case 'uint32': return view.getUint32(offset, le);
      default: return 0;
    }
  }

  let buf = new Uint8Array(0);
  function appendBuf(chunk) {
    const next = new Uint8Array(buf.length + chunk.length);
    next.set(buf); next.set(chunk, buf.length);
    buf = next;
  }

  let stream;
  try {
    stream = (await fetch(source, { signal: myAc.signal })).body;
  } catch (e) {
    if (e.name === 'AbortError') return;
    throw e;
  }
  const reader = stream.getReader();
  const dec = new TextDecoder('latin1');

  let headerDone = false, isAscii = false, isBinaryLE = true;
  let vertexCount = 0, bytesPerVertex = 0, props = [];
  let xI=-1, yI=-1, zI=-1, rI=-1, gI=-1, bI=-1;
  let posArr, colArr;
  let filled = 0, lastUpdate = 0;
  let asciiTail = '';

  function parseHeader() {
    const text = dec.decode(buf);
    const endMark = 'end_header\n';
    const ei = text.indexOf(endMark);
    if (ei === -1) return false;
    for (const raw of text.slice(0, ei).split('\n')) {
      const p = raw.trim().split(/\s+/);
      if (p[0] === 'format') { isAscii = p[1] === 'ascii'; isBinaryLE = p[1] === 'binary_little_endian'; }
      if (p[0] === 'element' && p[1] === 'vertex') vertexCount = parseInt(p[2]);
      if (p[0] === 'property' && p[1] !== 'list') {
        props.push({ name: p[2], type: p[1], offset: bytesPerVertex, size: TYPE_SIZE[p[1]] || 4 });
        bytesPerVertex += TYPE_SIZE[p[1]] || 4;
      }
    }
    props.forEach((p, i) => {
      if      (p.name === 'x')                       xI = i;
      else if (p.name === 'y')                       yI = i;
      else if (p.name === 'z')                       zI = i;
      else if (p.name === 'red'   || p.name === 'r') rI = i;
      else if (p.name === 'green' || p.name === 'g') gI = i;
      else if (p.name === 'blue'  || p.name === 'b') bI = i;
    });
    buf = buf.slice(new TextEncoder().encode(text.slice(0, ei + endMark.length)).length);
    return true;
  }

  function updateDraw() {
    if (filled - lastUpdate < Math.ceil(vertexCount / 20) && filled < vertexCount) return;
    cloud.geometry.setDrawRange(0, filled);
    cloud.geometry.attributes.position.needsUpdate = true;
    cloud.geometry.attributes.color.needsUpdate = true;
    lastUpdate = filled;
    status.textContent = `Loading… ${Math.round(filled / vertexCount * 100)}%`;
  }

  function processBinary() {
    const view = new DataView(buf.buffer);
    const n = Math.min(Math.floor(buf.length / bytesPerVertex), vertexCount - filled);
    for (let i = 0; i < n; i++) {
      const base = i * bytesPerVertex, i3 = (filled + i) * 3;
      posArr[i3]   = typeRead(view, props[xI].type, base + props[xI].offset, isBinaryLE);
      posArr[i3+1] = typeRead(view, props[yI].type, base + props[yI].offset, isBinaryLE);
      posArr[i3+2] = typeRead(view, props[zI].type, base + props[zI].offset, isBinaryLE);
      if (rI >= 0) {
        const s = (props[rI].type === 'uchar' || props[rI].type === 'uint8') ? 1/255 : 1;
        colArr[i3]   = typeRead(view, props[rI].type, base + props[rI].offset, isBinaryLE) * s;
        colArr[i3+1] = typeRead(view, props[gI].type, base + props[gI].offset, isBinaryLE) * s;
        colArr[i3+2] = typeRead(view, props[bI].type, base + props[bI].offset, isBinaryLE) * s;
      } else {
        colArr[i3] = colArr[i3+1] = colArr[i3+2] = 1;
      }
    }
    filled += n;
    buf = buf.slice(n * bytesPerVertex);
    updateDraw();
  }

  function processAscii() {
    const text = dec.decode(buf);
    buf = new Uint8Array(0);
    const lines = (asciiTail + text).split('\n');
    asciiTail = lines.pop();
    for (const line of lines) {
      if (filled >= vertexCount) break;
      const v = line.trim().split(/\s+/);
      if (v.length <= Math.max(xI, yI, zI)) continue;
      const i3 = filled * 3;
      posArr[i3]   = parseFloat(v[xI]);
      posArr[i3+1] = parseFloat(v[yI]);
      posArr[i3+2] = parseFloat(v[zI]);
      if (rI >= 0) {
        const s = (props[rI].type === 'uchar' || props[rI].type === 'uint8') ? 1/255 : 1;
        colArr[i3]   = parseFloat(v[rI]) * s;
        colArr[i3+1] = parseFloat(v[gI]) * s;
        colArr[i3+2] = parseFloat(v[bI]) * s;
      } else {
        colArr[i3] = colArr[i3+1] = colArr[i3+2] = 1;
      }
      filled++;
    }
    updateDraw();
  }

  while (true) {
    let done, value;
    try { ({ done, value } = await reader.read()); }
    catch (e) { if (e.name === 'AbortError') return; throw e; }
    if (done) break;
    appendBuf(value);

    if (!headerDone) {
      headerDone = parseHeader();
      if (headerDone) {
        if (vertexCount <= 0) throw new Error('PLY: no vertex count in header');
        posArr = new Float32Array(vertexCount * 3);
        colArr = new Float32Array(vertexCount * 3);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        geo.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));
        geo.setDrawRange(0, 0);
        if (cloud) scene.remove(cloud);
        cloud = new THREE.Points(geo, material);
        cloud.rotation.set(Math.PI, 0, 0);  // match desktop viewer default orientation
        scene.add(cloud);
        if (buf.length) { if (isAscii) processAscii(); else processBinary(); }
      }
    } else {
      if (isAscii) processAscii(); else processBinary();
    }
  }

  if (myAc.signal.aborted) return;

  // Finalize: center cloud, frame camera, scale helpers + point size
  cloud.geometry.setDrawRange(0, filled);
  cloud.geometry.attributes.position.needsUpdate = true;
  cloud.geometry.attributes.color.needsUpdate = true;
  cloud.geometry.computeBoundingBox();
  const box = cloud.geometry.boundingBox;
  const center = new THREE.Vector3();
  box.getCenter(center);
  sceneSize = box.getSize(new THREE.Vector3()).length();
  cloud.position.set(-center.x, -center.y, -center.z);

  szBase = sceneSize * 0.0024;     // (size * 0.0008) at default slider=3 → matches desktop
  applyPointSize();
  scaleHelpers(sceneSize);

  camera.position.set(0, 0, sceneSize * 0.8);
  camera.near = sceneSize * 0.0005;
  camera.far  = sceneSize * 20;
  camera.updateProjectionMatrix();
  controls.target.set(0, 0, 0);
  controls.minDistance = sceneSize * 0.001;
  controls.maxDistance = sceneSize * 10;
  controls.update();
  status.classList.add('hidden');
}

// ── Pointer handling for rotate-model mode ────────────────────────────────────
const dom = renderer.domElement;
dom.addEventListener('pointerdown', e => {
  if (!lockMode) return;
  drag.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (drag.pointers.size === 1) {
    drag.active = true;
    drag.lastX = e.clientX;
    drag.lastY = e.clientY;
  }
});
dom.addEventListener('pointermove', e => {
  if (!lockMode || !drag.active || !cloud) return;
  if (!drag.pointers.has(e.pointerId)) return;
  drag.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (drag.pointers.size === 1) {
    const dx = e.clientX - drag.lastX;
    const dy = e.clientY - drag.lastY;
    drag.lastX = e.clientX;
    drag.lastY = e.clientY;
    const SENS = 0.5 * D2R;
    cloud.rotation.y += dx * SENS;
    cloud.rotation.x += dy * SENS;
  }
});
function endPointer(e) {
  drag.pointers.delete(e.pointerId);
  if (drag.pointers.size === 0) drag.active = false;
  else {
    const p = drag.pointers.values().next().value;
    drag.lastX = p.x; drag.lastY = p.y;
  }
}
dom.addEventListener('pointerup',     endPointer);
dom.addEventListener('pointercancel', endPointer);

// ── Render loop ───────────────────────────────────────────────────────────────
function tick() {
  requestAnimationFrame(tick);
  if (controls.enabled) controls.update();
  renderer.render(scene, camera);
}
tick();

// ── Mode + buttons ────────────────────────────────────────────────────────────
function showPill(text) {
  modePill.textContent = text;
  modePill.classList.add('show');
  clearTimeout(showPill._t);
  showPill._t = setTimeout(() => modePill.classList.remove('show'), 1200);
}
function updateHelpersVisibility() {
  gridHelper.visible = axesHelper.visible = (axesOn || lockMode);
}
function setLockMode(on) {
  lockMode = on;
  controls.enabled = !on;
  $('lock-btn').classList.toggle('active', on);
  $('lock-label').textContent = on ? 'Orbit Camera' : 'Rotate Model';
  $('lock-btn').querySelector('.ico').textContent = on ? '🔓' : '🔒';
  updateHelpersVisibility();
  showPill(on ? 'Rotate Model — drag to spin' : 'Orbit Mode');
}
$('lock-btn').addEventListener('click', () => setLockMode(!lockMode));
$('reset-btn').addEventListener('click', () => {
  if (cloud) cloud.rotation.set(Math.PI, 0, 0);
  camera.position.set(0, 0, sceneSize * 0.8);
  controls.target.set(0, 0, 0);
  controls.update();
  showPill('Reset');
});
$('axes-btn').addEventListener('click', () => {
  axesOn = !axesOn;
  $('axes-btn').classList.toggle('active', axesOn);
  updateHelpersVisibility();
});

// ── Settings sheet ────────────────────────────────────────────────────────────
const sheet = $('sheet'), sheetBg = $('sheet-bg');
$('settings-btn').addEventListener('click', () => { sheet.classList.add('open'); sheetBg.classList.add('open'); });
sheetBg.addEventListener('click', () => { sheet.classList.remove('open'); sheetBg.classList.remove('open'); });
$('sheet-handle').addEventListener('click', () => { sheet.classList.remove('open'); sheetBg.classList.remove('open'); });

$('sz').addEventListener('input', applyPointSize);

// ── Dropdown / loading ────────────────────────────────────────────────────────
const FALLBACK = 'result_conf07_simplified.ply';

function plyUrl(collection, name) {
  return collection === 'apex'
    ? `/apex-runs/${encodeURIComponent(name)}/pointcloud.ply?shuffle=1`
    : `/examples/${encodeURIComponent(name)}?shuffle=1`;
}

async function populateDropdown() {
  status.textContent = 'Loading…';
  status.classList.remove('hidden');
  try {
    const names = currentCollection === 'apex'
      ? await fetch('/apex-runs/list').then(r => r.json())
      : await fetch('/examples/models.json').then(r => r.json());
    if (!names.length) throw new Error('empty');

    const p = new URLSearchParams(location.search);
    const urlColl  = p.get('collection') || 'examples';
    const urlModel = p.get('model');
    const preferred = (urlColl === currentCollection && urlModel && names.includes(urlModel))
      ? urlModel
      : (currentCollection === 'examples' && names.includes(FALLBACK) ? FALLBACK : null);

    names.sort((a, b) => {
      if (a === preferred) return -1;
      if (b === preferred) return  1;
      return a.localeCompare(b);
    });

    select.innerHTML = names.map(n =>
      `<option value="${n}"${n === preferred ? ' selected' : ''}>${n}</option>`
    ).join('');

    loadModel();
  } catch {
    select.innerHTML = '<option value="">No models found</option>';
    status.textContent = currentCollection === 'apex'
      ? 'No Apex runs found on server.'
      : 'No example models found.';
  }
}

function loadModel() {
  if (!select.value) return;
  status.textContent = 'Loading…';
  status.classList.remove('hidden');
  const url = plyUrl(currentCollection, select.value);
  const p = new URLSearchParams(location.search);
  p.set('collection', currentCollection);
  p.set('model', select.value);
  history.replaceState(null, '', '?' + p.toString());
  streamPly(url).catch(e => {
    status.textContent = 'Failed: ' + e.message;
  });
}

select.addEventListener('change', loadModel);
collTabs.addEventListener('click', e => {
  const btn = e.target.closest('button[data-coll]');
  if (!btn || btn.dataset.coll === currentCollection) return;
  setCollection(btn.dataset.coll);
  populateDropdown();
});

$('copy-link-btn').addEventListener('click', e => {
  e.preventDefault();
  navigator.clipboard?.writeText(location.href).then(() => {
    const btn = $('copy-link-btn');
    const prev = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = prev; }, 1500);
  });
});

// honor ?collection=… on first load
const initColl = new URLSearchParams(location.search).get('collection');
if (initColl === 'apex' || initColl === 'examples') setCollection(initColl);

// prevent browser pinch-zoom
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

populateDropdown();
</script>
</body>
</html>
